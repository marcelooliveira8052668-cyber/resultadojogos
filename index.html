<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palpites Coletivos</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #009639;
        color: white;
        padding: 20px;
        text-align: center;
      }
      .card {
        background-color: #ffdf00;
        color: #002776;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 20px;
        max-width: 400px;
        margin: 0 auto;
      }
      input {
        width: 80%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }
      .placar {
        width: 100px;
        text-align: center;
      }
      button {
        background-color: #002776;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
      }
      .item-lista {
        background: white;
        margin: 5px 0;
        padding: 10px;
        border-radius: 5px;
        color: #002776;
      }
    </style>
  </head>
  <body>
    <h1>Palpites do Jogo ⚽</h1>

    <div class="card">
      <input type="text" id="nome" placeholder="Seu nome" />
      <input type="number" id="golsBrasil" class="placar" placeholder="BRASIL" />
      <span>x</span>
      <input type="number" id="golsEscocia" class="placar" placeholder="ESCÓCIA" />
      <br />
      <button onclick="adicionarPalpite()">Enviar Palpite</button>
    </div>

    <h3>Lista de Palpites:</h3>
    <div id="listaPalpites"></div>
    <button
      onclick="limparTudo()"
      style="background: #d32f2f; margin-top: 20px"
    >
      Limpar todos os palpites
    </button>

    <script>
      function carregarLista() {
        const lista = JSON.parse(
          localStorage.getItem("palpites_gerais") || "[]",
        );
        const divLista = document.getElementById("listaPalpites");
        divLista.innerHTML = "";

        lista.forEach((p, index) => {
          divLista.innerHTML += `<div class="item-lista">${p.nome}: ${p.placar}</div>`;
        });
      }

      function adicionarPalpite() {
        const nome = document.getElementById("nome").value;
        const b = document.getElementById("golsBrasil").value;
        const e = document.getElementById("golsEscocia").value;

        if (!nome || !b || !e) return alert("Preencha tudo!");

        const lista = JSON.parse(
          localStorage.getItem("palpites_gerais") || "[]",
        );
        lista.push({ nome: nome, placar: `${b} x ${e}` });

        localStorage.setItem("palpites_gerais", JSON.stringify(lista));
        carregarLista();

        // Limpa os campos
        document.getElementById("nome").value = "";
        document.getElementById("golsBrasil").value = "";
        document.getElementById("golsEscocia").value = "";
      }

      function limparTudo() {
        localStorage.removeItem("palpites_gerais");
        carregarLista();
      }

      window.onload = carregarLista;
    </script>
  </body>
</html>
