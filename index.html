<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Palpites Brasil x Japão</title>
    <style>
        body { font-family: sans-serif; background: #009639; color: white; padding: 20px; text-align: center; }
        .card { background: #ffdf00; color: #002776; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { background: #002776; color: white; border: none; padding: 10px 20px; margin-top: 10px; border-radius: 5px; cursor: pointer; }
        .item { background: white; color: #002776; padding: 10px; margin: 10px auto; border-radius: 5px; max-width: 300px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <h1>Brasil 🇧🇷 x Japão 🇯🇵</h1>
    <div class="card">
        <input id="nome" placeholder="Seu nome">
        <input id="golsBrasil" type="number" placeholder="Gols Brasil">
        <input id="golsJapao" type="number" placeholder="Gols Japão">
        <br>
        <button onclick="enviar()">Enviar Palpite</button>
    </div>

    <div id="lista"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        // Importante: adicionei o 'doc' aqui
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyBDCeIiV7B4yfCMjyQjULHIg6UoetCd9DE",
            authDomain: "palpitesjogo-12ad9.firebaseapp.com",
            projectId: "palpitesjogo-12ad9",
            storageBucket: "palpitesjogo-12ad9.firebasestorage.app",
            messagingSenderId: "679263676131",
            appId: "1:679263676131:web:c15882d1550c6389e087d6"
        };

        const db = getFirestore(initializeApp(config));
        const col = collection(db, "palpites");

        // 1. Enviar para o Banco
        window.enviar = async () => {
            const n = document.getElementById('nome').value;
            const b = document.getElementById('golsBrasil').value;
            const j = document.getElementById('golsJapao').value;
            
            if(n && b !== "" && j !== "") {
                await addDoc(col, { nome: n, brasil: b, japao: j, data: Date.now() });
                document.getElementById('nome').value = "";
                document.getElementById('golsBrasil').value = "";
                document.getElementById('golsJapao').value = "";
            } else {
                alert("Por favor, preencha todos os campos!");
            }
        };

        // 2. Ouvir o Banco
        onSnapshot(query(col, orderBy("data", "desc")), (snap) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "<h3>Lista de Palpites:</h3>";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                // Adicionei o botão de excluir (x)
                lista.innerHTML += `
                    <div class="item">
                        <span>${d.nome}: ${d.brasil} x ${d.japao}</span>
                        <button onclick="apagarUm('${docSnap.id}')" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">x</button>
                    </div>`;
            });
        });

        // 3. Apagar um específico
        window.apagarUm = async (id) => {
            const confirmar = confirm("Tem certeza que quer apagar este palpite?");
            if (confirmar) {
                await deleteDoc(doc(db, "palpites", id));
            }
        };

        // 4. Limpador Geral (Senha)
        window.limparPalpites = async () => {
            const senha = prompt("Digite a senha de administrador:");
            if (senha === "185422") {
                const querySnapshot = await getDocs(col);
                querySnapshot.forEach(async (docSnap) => {
                    await deleteDoc(docSnap.ref);
                });
                alert("Lista limpa!");
            } else {
                alert("Senha incorreta!");
            }
        };
    </script>

    <br><br>
    <button onclick="limparPalpites()" style="background: red; font-size: 12px;">Administrador: Limpar Tudo</button>
</body>
</html>
